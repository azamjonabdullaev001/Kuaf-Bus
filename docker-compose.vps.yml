services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: kuafbus-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - kuafbus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Backend (Go)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: kuafbus-backend
    ports:
      - "8083:8083"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kuafbus
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Admin Panel (React + Nginx)
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://84.247.138.53:8083/api
    container_name: kuafbus-admin
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - kuafbus
    restart: always
    volumes:
      - ./admin-panel/nginx.vps.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
    driver: local

networks:
  kuafbus:
    driver: bridge
